<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MM Tok</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .menu-bar { text-align: left; font-size: 24px; cursor: pointer; }
        .logo { font-size: 32px; font-weight: bold; margin: 30px 0; }
        .logo span { color: #ff4444; }
        input { width: 100%; max-width: 400px; padding: 15px; border-radius: 25px; border: none; background: #2a2a2a; color: white; }
        .dl-btn { background: #ff4444; padding: 15px 40px; border-radius: 25px; border: none; color: white; margin-top: 15px; }
        .socials { display: flex; justify-content: center; gap: 15px; margin-top: 40px; }
        .history-item { margin: 10px; padding: 10px; background: #333; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="menu-bar" onclick="alert('Settings: Language/Theme | About: MM Tok v1.0')">☰</div>
    <div class="logo">MM <span>Tok</span></div>
    
    <input type="text" id="url" placeholder="TikTok/YouTube Link...">
    <br><button class="dl-btn" onclick="fetchData()">Download</button>

    <div id="result" style="margin-top:20px;"></div>

    <div class="socials">
        <a href="https://tiktok.com">TikTok</a> <a href="https://fb.com">FB</a> <a href="https://yt.com">YT</a>
    </div>

    <script>
        let count = 0;
        const AD_LINK = "https://www.effectivecpmnetwork.com/xty6yh7g4z?key=7022e23017dbd223e0d1baa45cd4e219";

        async function fetchData() {
            count++;
            if (count % 2 === 0) window.open(AD_LINK, "_blank"); // ကြော်ငြာဝင်အောင်
            
            const url = document.getElementById('url').value;
            const res = await fetch('/download', { method: 'POST', body: JSON.stringify({url}), headers: {'Content-Type': 'application/json'} });
            const data = await res.json();
            
            if(data.url) {
                document.getElementById('result').innerHTML = `
                    <img src="${data.thumbnail}" width="200" style="border-radius:10px;"><br>
                    <a href="${data.url}" download class="dl-btn">Download Video</a>
                `;
                // History သိမ်းခြင်း
                let h = JSON.parse(localStorage.getItem('hist') || '[]');
                h.push(data.title);
                localStorage.setItem('hist', JSON.stringify(h));
            }
        }
    </script>
</body>
</html>
