<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>MM Tok - Recap with Tarbin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="nav">
        <div class="menu-icon" onclick="alert('Menu: Settings, History, About')">☰</div>
        <div class="logo">Recap with <span>Tarbin</span></div>
    </div>
    <div class="container">
        <input type="text" id="url" placeholder="TikTok/Instagram Link...">
        <button class="dl-btn" onclick="fetchVideo()">Download Now</button>
        <div id="result"></div>
    </div>
    <div class="socials">
        <a href="#">TikTok</a><a href="#">FB</a><a href="#">Insta</a>
    </div>
    <script>
        async function fetchVideo() {
            const url = document.getElementById('url').value;
            const res = await fetch('/download', { method: 'POST', body: JSON.stringify({url}), headers: {'Content-Type': 'application/json'} });
            const data = await res.json();
            if(data.url) {
                document.getElementById('result').innerHTML = `<img src="${data.thumbnail}" width="100%"><br><a href="${data.url}" class="dl-btn">Save Video</a>`;
            } else { alert("Error: Link ကို စစ်ဆေးပါ"); }
        }
    </script>
</body>
</html>
