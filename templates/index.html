<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MM Tok</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .input-box { width: 100%; max-width: 400px; padding: 15px; border-radius: 20px; border: none; margin-bottom: 10px; }
        .btn { background: #ff4444; color: white; padding: 15px 30px; border-radius: 20px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>MM <span>Tok</span></h1>
    <input type="text" id="url" class="input-box" placeholder="Link ထည့်ပါ...">
    <br><button class="btn" onclick="fetchVideo()">Download</button>
    <div id="result" style="margin-top:20px;"></div>

    <script>
        async function fetchVideo() {
            const url = document.getElementById('url').value;
            const res = await fetch('/download', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url})
            });
            const data = await res.json();
            if(data.error) alert("Error: " + data.error);
            else document.getElementById('result').innerHTML = `
                <img src="${data.thumbnail}" width="200" style="border-radius:10px;"><br>
                <a href="${data.url}" download class="btn" style="display:inline-block; margin-top:10px;">Download Now</a>
            `;
        }
    </script>
</body>
</html>
